name: Azure Container Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  APP_NAME: ${{ secrets.AZURE_APP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      - name: Build and Push Docker Image
        run: |
          docker build -t $ACR_NAME.azurecr.io/peerlearn-app:${{ github.sha }} .
          docker push $ACR_NAME.azurecr.io/peerlearn-app:${{ github.sha }}
          docker tag $ACR_NAME.azurecr.io/peerlearn-app:${{ github.sha }} $ACR_NAME.azurecr.io/peerlearn-app:latest
          docker push $ACR_NAME.azurecr.io/peerlearn-app:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/peerlearn-app:${{ github.sha }}
