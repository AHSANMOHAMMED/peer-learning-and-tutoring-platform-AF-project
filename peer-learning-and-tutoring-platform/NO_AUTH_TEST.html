<!DOCTYPE html>
<html>
<head>
    <title>No Auth Test - Q&A Forum</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 2px solid #007bff; border-radius: 8px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .info { color: blue; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .result { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 4px; }
        .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🔓 Q&A Forum - No Authentication Test</h1>
    
    <div class="test-section">
        <h2>🎯 Test 1: Direct Backend API</h2>
        <button onclick="testBackendAPI()">Test Backend API Directly</button>
        <div id="backendResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>🎯 Test 2: Frontend Integration</h2>
        <button onclick="testFrontendIntegration()">Test Frontend Integration</button>
        <div id="frontendResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>🎯 Test 3: Create Question Form</h2>
        <input type="text" id="testTitle" placeholder="Question title" value="No Auth Test Question" style="width: 300px; margin: 5px;">
        <br>
        <select id="testCategory" style="width: 300px; margin: 5px;">
            <option value="general">General</option>
            <option value="academic">Academic</option>
            <option value="technical">Technical</option>
            <option value="career">Career</option>
            <option value="other">Other</option>
        </select>
        <br>
        <textarea id="testBody" placeholder="Question body (30+ chars)" style="width: 300px; height: 80px; margin: 5px;">This is a test question to verify the Q&A Forum works completely without authentication dependencies</textarea>
        <br>
        <button onclick="testCreateQuestion()">Create Question</button>
        <div id="createResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>🎯 Test 4: Check Questions</h2>
        <button onclick="checkQuestions">Check All Questions</button>
        <div id="questionsResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>🎯 Test 5: Test Voting</h2>
        <input type="text" id="voteTargetId" placeholder="Question ID" style="width: 300px; margin: 5px;">
        <br>
        <button onclick="testVote()">Test Upvote</button>
        <div id="voteResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>📋 Console Log</h2>
        <button onclick="clearLog()">Clear Log</button>
        <div id="consoleLog" class="log">Console output will appear here...</div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api/qa';
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('consoleLog');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'black';
            logDiv.innerHTML += `<div style="color: ${color}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<span class="${type}">${message}</span>`;
        }

        async function testBackendAPI() {
            try {
                log('Testing backend API directly...');
                const response = await fetch(`${API_BASE}/questions`);
                const data = await response.json();
                
                log(`Backend API Response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.success) {
                    showResult('backendResult', `✅ Backend API WORKING! Found ${data.data.length} questions`, 'success');
                } else {
                    showResult('backendResult', `❌ Backend API FAILED: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`Backend API Error: ${error.message}`, 'error');
                showResult('backendResult', `❌ Backend API ERROR: ${error.message}`, 'error');
            }
        }

        async function testFrontendIntegration() {
            try {
                log('Testing frontend integration...');
                
                // Test if we can reach the frontend
                const frontendResponse = await fetch('http://localhost:3000/forum');
                const frontendText = await frontendResponse.text();
                
                log(`Frontend Response Status: ${frontendResponse.status}`);
                log(`Frontend Response: ${frontendText.substring(0, 200)}...`);
                
                if (frontendResponse.ok) {
                    showResult('frontendResult', `✅ Frontend ACCESSIBLE! Status: ${frontendResponse.status}`, 'success');
                } else {
                    showResult('frontendResult', `❌ Frontend NOT ACCESSIBLE! Status: ${frontendResponse.status}`, 'error');
                }
            } catch (error) {
                log(`Frontend Error: ${error.message}`, 'error');
                showResult('frontendResult', `❌ Frontend ERROR: ${error.message}`, 'error');
            }
        }

        async function testCreateQuestion() {
            try {
                const title = document.getElementById('testTitle').value;
                const category = document.getElementById('testCategory').value;
                const body = document.getElementById('testBody').value;
                
                if (!title || !body || !category) {
                    showResult('createResult', '❌ Please fill all fields', 'error');
                    return;
                }
                
                if (body.length < 30) {
                    showResult('createResult', '❌ Body must be at least 30 characters', 'error');
                    return;
                }
                
                log(`Creating question: title="${title}", category="${category}", body="${body.substring(0, 50)}..."`);
                
                const response = await fetch(`${API_BASE}/questions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, body, category, tags: ['no-auth', 'test'] })
                });
                
                const data = await response.json();
                log(`Create Response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.success) {
                    showResult('createResult', `✅ Question CREATED! ID: ${data.data._id}`, 'success');
                    document.getElementById('voteTargetId').value = data.data._id;
                } else {
                    showResult('createResult', `❌ Create FAILED: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`Create Error: ${error.message}`, 'error');
                showResult('createResult', `❌ Create ERROR: ${error.message}`, 'error');
            }
        }

        async function checkQuestions() {
            try {
                log('Checking all questions...');
                const response = await fetch(`${API_BASE}/questions`);
                const data = await response.json();
                
                log(`Questions Response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.success) {
                    showResult('questionsResult', `✅ Found ${data.data.length} questions in database`, 'success');
                    
                    // List first few questions
                    const questionsList = data.data.slice(0, 3).map((q, i) => 
                        `${i+1}. ${q.title} (ID: ${q._id})`
                    ).join('\n');
                    log(`First 3 questions:\n${questionsList}`);
                } else {
                    showResult('questionsResult', `❌ Check FAILED: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`Check Error: ${error.message}`, 'error');
                showResult('questionsResult', `❌ Check ERROR: ${error.message}`, 'error');
            }
        }

        async function testVote() {
            try {
                const targetId = document.getElementById('voteTargetId').value;
                
                if (!targetId) {
                    showResult('voteResult', '❌ Please enter a Question ID', 'error');
                    return;
                }
                
                log(`Testing vote on question: ${targetId}`);
                
                const response = await fetch(`${API_BASE}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        targetType: 'question',
                        targetId: targetId,
                        value: 1
                    })
                });
                
                const data = await response.json();
                log(`Vote Response: ${JSON.stringify(data, null, 2)}`);
                
                if (data.success) {
                    showResult('voteResult', `✅ Vote SUCCESS! Points awarded`, 'success');
                } else {
                    showResult('voteResult', `❌ Vote FAILED: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`Vote Error: ${error.message}`, 'error');
                showResult('voteResult', `❌ Vote ERROR: ${error.message}`, 'error');
            }
        }

        function clearLog() {
            document.getElementById('consoleLog').innerHTML = 'Console output will appear here...';
        }

        // Auto-test on page load
        window.onload = function() {
            log('No Auth Test Page Loaded');
            log('Ready to test Q&A Forum without authentication');
            log('Backend: http://localhost:5000/api/qa');
            log('Frontend: http://localhost:3000/forum');
        };
    </script>
</body>
</html>
