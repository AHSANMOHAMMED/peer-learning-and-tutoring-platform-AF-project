<!DOCTYPE html>
<html>
<head>
    <title>PUT & DELETE API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 5px; }
        .delete-btn { background: #dc2626; }
        input { padding: 8px; margin: 5px; width: 300px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>PUT & DELETE API Test</h1>

    <!-- Login Section -->
    <div class="section">
        <h2>1. Login First</h2>
        <input type="email" id="loginEmail" placeholder="Email" value="admin@peerlearn.com">
        <input type="password" id="loginPassword" placeholder="Password" value="Admin@12345">
        <button onclick="login()">Login</button>
        <pre id="loginResult"></pre>
    </div>

    <!-- PUT - Update Profile -->
    <div class="section">
        <h2>2. PUT - Update Profile</h2>
        <input type="text" id="firstName" placeholder="First Name" value="Admin">
        <input type="text" id="lastName" placeholder="Last Name" value="User">
        <input type="text" id="bio" placeholder="Bio" value="Updated bio">
        <button onclick="updateProfile()">Update Profile (PUT)</button>
        <pre id="putResult"></pre>
    </div>

    <!-- DELETE - Delete Notification -->
    <div class="section">
        <h2>3. DELETE - Delete Notification</h2>
        <input type="text" id="notificationId" placeholder="Notification ID">
        <button class="delete-btn" onclick="deleteNotification()">Delete Notification</button>
        <pre id="deleteResult"></pre>
    </div>

    <!-- PUT - Change Password -->
    <div class="section">
        <h2>4. PUT - Change Password</h2>
        <input type="password" id="currentPassword" placeholder="Current Password">
        <input type="password" id="newPassword" placeholder="New Password">
        <button onclick="changePassword()">Change Password (PUT)</button>
        <pre id="passwordResult"></pre>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        let token = '';

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                document.getElementById('loginResult').innerHTML = JSON.stringify(data, null, 2);
                
                if (data.success) {
                    token = data.data.token;
                    document.getElementById('loginResult').className = 'success';
                    alert('Login successful! Token saved.');
                }
            } catch (error) {
                document.getElementById('loginResult').innerHTML = 'Error: ' + error.message;
                document.getElementById('loginResult').className = 'error';
            }
        }

        async function updateProfile() {
            if (!token) {
                alert('Please login first!');
                return;
            }

            const profileData = {
                profile: {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    bio: document.getElementById('bio').value
                }
            };

            try {
                const response = await fetch(`${API_URL}/api/users/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(profileData)
                });

                const data = await response.json();
                document.getElementById('putResult').innerHTML = JSON.stringify(data, null, 2);
                document.getElementById('putResult').className = data.success ? 'success' : 'error';
            } catch (error) {
                document.getElementById('putResult').innerHTML = 'Error: ' + error.message;
                document.getElementById('putResult').className = 'error';
            }
        }

        async function deleteNotification() {
            if (!token) {
                alert('Please login first!');
                return;
            }

            const notificationId = document.getElementById('notificationId').value;
            if (!notificationId) {
                alert('Please enter notification ID');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/notifications/${notificationId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                document.getElementById('deleteResult').innerHTML = JSON.stringify(data, null, 2);
                document.getElementById('deleteResult').className = data.success ? 'success' : 'error';
            } catch (error) {
                document.getElementById('deleteResult').innerHTML = 'Error: ' + error.message;
                document.getElementById('deleteResult').className = 'error';
            }
        }

        async function changePassword() {
            if (!token) {
                alert('Please login first!');
                return;
            }

            const passwordData = {
                currentPassword: document.getElementById('currentPassword').value,
                newPassword: document.getElementById('newPassword').value
            };

            try {
                const response = await fetch(`${API_URL}/api/auth/change-password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(passwordData)
                });

                const data = await response.json();
                document.getElementById('passwordResult').innerHTML = JSON.stringify(data, null, 2);
                document.getElementById('passwordResult').className = data.success ? 'success' : 'error';
            } catch (error) {
                document.getElementById('passwordResult').innerHTML = 'Error: ' + error.message;
                document.getElementById('passwordResult').className = 'error';
            }
        }
    </script>
</body>
</html>
