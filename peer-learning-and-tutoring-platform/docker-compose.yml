version: '3.8'

services:
  # Main application server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: peer-learning-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/peer_learning
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - mongo
      - redis
    networks:
      - peer-learning-network
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB database
  mongo:
    image: mongo:6.0
    container_name: peer-learning-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=peer_learning
    volumes:
      - mongo-data:/data/db
      - ./server/scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - peer-learning-network

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: peer-learning-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - peer-learning-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: peer-learning-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./client/build:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - peer-learning-network

  # MongoDB backup service
  mongo-backup:
    image: mongo:6.0
    container_name: peer-learning-backup
    restart: unless-stopped
    volumes:
      - backup-data:/backup
    networks:
      - peer-learning-network
    environment:
      - MONGO_URI=mongodb://mongo:27017/peer_learning
    command: >
      sh -c '
        while true; do
          mongodump --host mongo --out /backup/$(date +%Y%m%d-%H%M%S)
          find /backup -type d -mtime +7 -exec rm -rf {} +
          sleep 86400
        done
      '
    depends_on:
      - mongo

volumes:
  mongo-data:
  redis-data:
  uploads:
  backup-data:

networks:
  peer-learning-network:
    driver: bridge
