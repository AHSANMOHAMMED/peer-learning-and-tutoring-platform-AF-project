<!DOCTYPE html>
<html>
<head>
    <title>Profile Update Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 5px; }
        input { padding: 8px; margin: 5px; width: 100%; box-sizing: border-box; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Profile Update Test</h1>

    <div class="section">
        <h2>1. Login</h2>
        <input type="email" id="email" placeholder="Email" value="admin@peerlearn.com">
        <input type="password" id="password" placeholder="Password" value="Admin@12345">
        <button onclick="login()">Login</button>
        <pre id="loginResult"></pre>
    </div>

    <div class="section">
        <h2>2. Update Profile (PUT)</h2>
        <input type="text" id="firstName" placeholder="First Name" value="Sureka">
        <input type="text" id="lastName" placeholder="Last Name" value="Siva">
        <input type="text" id="bio" placeholder="Bio" value="Updated bio text">
        <button onclick="updateProfile()">Update Profile</button>
        <pre id="updateResult"></pre>
    </div>

    <script>
        const API = 'http://localhost:5000';
        let token = '';

        async function login() {
            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await res.json();
                document.getElementById('loginResult').textContent = JSON.stringify(data, null, 2);
                
                if (data.success) {
                    token = data.data.token;
                    alert('✅ Login successful!');
                }
            } catch (error) {
                document.getElementById('loginResult').textContent = 'Error: ' + error.message;
            }
        }

        async function updateProfile() {
            if (!token) {
                alert('Please login first!');
                return;
            }

            try {
                const res = await fetch(`${API}/api/users/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        profile: {
                            firstName: document.getElementById('firstName').value,
                            lastName: document.getElementById('lastName').value,
                            bio: document.getElementById('bio').value
                        }
                    })
                });

                const data = await res.json();
                document.getElementById('updateResult').textContent = JSON.stringify(data, null, 2);
                document.getElementById('updateResult').className = data.success ? 'success' : 'error';
                
                if (data.success) {
                    alert('✅ Profile updated successfully!');
                }
            } catch (error) {
                document.getElementById('updateResult').textContent = 'Error: ' + error.message;
                document.getElementById('updateResult').className = 'error';
            }
        }
    </script>
</body>
</html>
